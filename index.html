<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Budget</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f5f3ee;
    --cream: #ede9e0;
    --accent: #c8622a;
    --accent2: #3a6b5c;
    --muted: #8a8778;
    --border: #d4cfc4;
    --income-c: #3a6b5c;
    --expense-c: #c8622a;

    --cat-logement: #2d4a3e;
    --cat-nourriture: #c8622a;
    --cat-loisirs: #6b5b2d;
    --cat-transport: #4a5c6b;
    --cat-sante: #7a3a4a;
    --cat-vetements: #5c4a7a;
    --cat-abonnements: #2d5c6b;
    --cat-autres: #6b6b5c;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── Layout ── */
  .app { display:flex; min-height:100vh; }

  /* ── Sidebar ── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--ink);
    color: var(--paper);
    display: flex;
    flex-direction: column;
    padding: 32px 0;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }

  .logo {
    padding: 0 28px 32px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .logo-name {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.5px;
  }

  .logo-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    font-weight: 300;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .nav {
    padding: 24px 0;
    flex: 1;
  }

  .nav-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    padding: 0 28px;
    margin-bottom: 8px;
    margin-top: 16px;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 28px;
    font-size: 14px;
    font-weight: 400;
    color: rgba(255,255,255,0.55);
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all 0.15s;
  }

  .nav-item:hover { color: rgba(255,255,255,0.9); background: rgba(255,255,255,0.04); }
  .nav-item.active { color: #fff; border-left-color: var(--accent); background: rgba(200,98,42,0.12); }

  .nav-icon { width: 16px; opacity: 0.7; font-style: normal; font-size: 15px; }

  .month-picker {
    padding: 20px 28px 0;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .month-picker-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 10px;
  }

  .month-list { display: flex; flex-direction: column; gap: 2px; }

  .month-btn {
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 400;
    color: rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .month-btn:hover { background: rgba(255,255,255,0.06); color: rgba(255,255,255,0.9); }
  .month-btn.active { background: rgba(200,98,42,0.18); color: #fff; }

  .month-btn .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent);
    opacity: 0;
  }
  .month-btn.has-data .dot { opacity: 1; }

  /* ── Main ── */
  .main {
    flex: 1;
    padding: 40px 48px;
    max-width: 1100px;
  }

  .page { display: none; }
  .page.active { display: block; }

  /* ── Header ── */
  .page-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 36px;
  }

  .page-title {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    letter-spacing: -1px;
    line-height: 1;
  }

  .page-title em { font-style: italic; color: var(--accent); }

  .current-month-badge {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    background: var(--cream);
    padding: 6px 14px;
    border-radius: 20px;
  }

  /* ── Balance cards ── */
  .balance-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 36px;
  }

  .card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 22px 24px;
  }

  .card-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .card-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    letter-spacing: -1px;
  }

  .card.income .card-amount { color: var(--income-c); }
  .card.expenses .card-amount { color: var(--expense-c); }

  .card.balance .card-amount {
    color: var(--ink);
  }

  .card.balance.positive .card-amount { color: var(--income-c); }
  .card.balance.negative .card-amount { color: var(--expense-c); }

  .card-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── Two columns ── */
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; }

  /* ── Chart card ── */
  .chart-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .chart-card-title {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 20px;
    color: var(--ink);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 1.5px;
    color: var(--muted);
  }

  .chart-wrap {
    position: relative;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .chart-empty {
    font-size: 13px;
    color: var(--muted);
    font-style: italic;
    text-align: center;
  }

  /* ── Legend ── */
  .legend { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }

  .legend-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }

  .legend-left { display: flex; align-items: center; gap: 8px; }

  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 3px;
    flex-shrink: 0;
  }

  .legend-name { color: var(--ink); }
  .legend-pct { color: var(--muted); font-size: 12px; }
  .legend-amt { font-weight: 500; color: var(--ink); }

  /* ── Transactions list ── */
  .transactions-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 28px;
  }

  .tx-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .tx-title {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .tx-list { display: flex; flex-direction: column; gap: 2px; }

  .tx-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 14px;
    border-radius: 8px;
    transition: background 0.1s;
    gap: 12px;
  }

  .tx-item:hover { background: var(--paper); }

  .tx-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }

  .tx-cat-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .tx-info { min-width: 0; }
  .tx-name { font-size: 14px; font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tx-cat { font-size: 11px; color: var(--muted); margin-top: 1px; }

  .tx-date { font-size: 12px; color: var(--muted); flex-shrink: 0; }

  .tx-amount {
    font-family: 'DM Serif Display', serif;
    font-size: 16px;
    flex-shrink: 0;
  }

  .tx-amount.income { color: var(--income-c); }
  .tx-amount.expense { color: var(--expense-c); }

  .tx-delete {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    opacity: 0;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .tx-item:hover .tx-delete { opacity: 1; }
  .tx-delete:hover { background: #fee; color: #c00; }

  /* ── Add form ── */
  .add-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 28px;
  }

  .add-title {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 12px;
    align-items: end;
  }

  .form-group { display: flex; flex-direction: column; gap: 6px; }

  .form-label { font-size: 11px; font-weight: 500; letter-spacing: 0.5px; color: var(--muted); text-transform: uppercase; }

  .form-input, .form-select {
    height: 42px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 0 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--ink);
    background: var(--paper);
    transition: border-color 0.15s;
    width: 100%;
  }

  .form-input:focus, .form-select:focus {
    outline: none;
    border-color: var(--ink);
  }

  .form-input::placeholder { color: var(--muted); }

  .type-toggle {
    display: flex;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    height: 42px;
    background: var(--paper);
  }

  .type-btn {
    flex: 1;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.15s;
  }

  .type-btn.active-expense { background: var(--expense-c); color: white; }
  .type-btn.active-income { background: var(--income-c); color: white; }

  .btn-add {
    height: 42px;
    background: var(--ink);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    letter-spacing: 0.3px;
    transition: all 0.15s;
    padding: 0 24px;
  }

  .btn-add:hover { background: #333; transform: translateY(-1px); }
  .btn-add:active { transform: translateY(0); }

  /* ── History page ── */
  .history-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }

  .history-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .history-card:hover { border-color: var(--ink); transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.07); }

  .history-month {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }

  .history-year { font-size: 12px; color: var(--muted); margin-bottom: 14px; }

  .history-chart-wrap { height: 100px; position: relative; margin-bottom: 12px; }

  .history-stats { display: flex; justify-content: space-between; font-size: 12px; }
  .history-stat-label { color: var(--muted); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; }
  .history-stat-val { font-weight: 500; font-size: 14px; margin-top: 2px; }
  .history-stat-val.pos { color: var(--income-c); }
  .history-stat-val.neg { color: var(--expense-c); }

  .empty-history {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
    font-style: italic;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--ink);
    color: white;
    padding: 12px 22px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 1000;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .sidebar { width: 200px; }
    .main { padding: 28px 24px; }
    .balance-row { grid-template-columns: 1fr; }
    .two-col { grid-template-columns: 1fr; }
    .form-grid { grid-template-columns: 1fr 1fr; }
    .history-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ── -->
  <nav class="sidebar">
    <div class="logo">
      <div class="logo-name">Mon Budget</div>
      <div class="logo-sub">Suivi personnel</div>
    </div>

    <div class="nav">
      <div class="nav-label">Menu</div>
      <div class="nav-item active" onclick="showPage('dashboard')" id="nav-dashboard">
        <em class="nav-icon">◎</em> Tableau de bord
      </div>
      <div class="nav-item" onclick="showPage('history')" id="nav-history">
        <em class="nav-icon">◷</em> Historique
      </div>
    </div>

    <div class="month-picker">
      <div class="month-picker-label">Mois</div>
      <div class="month-list" id="monthList"></div>
    </div>
  </nav>

  <!-- ── Main ── -->
  <main class="main">

    <!-- Dashboard -->
    <div class="page active" id="page-dashboard">
      <div class="page-header">
        <h1 class="page-title">Mes <em>dépenses</em></h1>
        <div class="current-month-badge" id="currentMonthBadge">—</div>
      </div>

      <!-- Balance cards -->
      <div class="balance-row">
        <div class="card income">
          <div class="card-label">Revenus</div>
          <div class="card-amount" id="totalIncome">0 €</div>
          <div class="card-sub" id="incomeCount">0 entrée</div>
        </div>
        <div class="card expenses">
          <div class="card-label">Dépenses</div>
          <div class="card-amount" id="totalExpenses">0 €</div>
          <div class="card-sub" id="expenseCount">0 dépense</div>
        </div>
        <div class="card balance" id="balanceCard">
          <div class="card-label">Solde du mois</div>
          <div class="card-amount" id="balance">0 €</div>
          <div class="card-sub" id="balanceSub">Ajoutez des entrées</div>
        </div>
      </div>

      <!-- Chart + legend -->
      <div class="two-col">
        <div class="chart-card">
          <div class="chart-card-title">Répartition des dépenses</div>
          <div class="chart-wrap">
            <canvas id="pieChart" style="max-width:200px;max-height:200px;"></canvas>
            <div class="chart-empty" id="pieEmpty">Aucune dépense ce mois</div>
          </div>
          <div class="legend" id="pieLegend"></div>
        </div>

        <div class="transactions-card" style="margin:0">
          <div class="tx-header">
            <div class="tx-title">Toutes les entrées</div>
          </div>
          <div class="tx-list" id="txList">
            <div style="text-align:center;padding:30px;color:var(--muted);font-style:italic;font-size:13px;">
              Aucune entrée ce mois
            </div>
          </div>
        </div>
      </div>

      <!-- Add form -->
      <div class="add-card">
        <div class="add-title">Ajouter une entrée</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Description</label>
            <input class="form-input" id="inputDesc" placeholder="ex : Courses Lidl" />
          </div>
          <div class="form-group">
            <label class="form-label">Montant (€)</label>
            <input class="form-input" id="inputAmount" type="number" min="0" step="0.01" placeholder="0.00" />
          </div>
          <div class="form-group">
            <label class="form-label">Catégorie</label>
            <select class="form-select" id="inputCat">
              <option value="nourriture">🛒 Nourriture</option>
              <option value="logement">🏠 Logement</option>
              <option value="transport">🚗 Transport</option>
              <option value="loisirs">🎮 Loisirs</option>
              <option value="sante">💊 Santé</option>
              <option value="vetements">👕 Vêtements</option>
              <option value="abonnements">📱 Abonnements</option>
              <option value="autres">✦ Autres</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Type</label>
            <div class="type-toggle">
              <button class="type-btn active-expense" id="typeExpense" onclick="setType('expense')">− Dépense</button>
              <button class="type-btn" id="typeIncome" onclick="setType('income')">+ Revenu</button>
            </div>
          </div>
          <div class="form-group" style="grid-column: 1/-1; display:flex; justify-content:flex-end;">
            <button class="btn-add" onclick="addTransaction()">Ajouter →</button>
          </div>
        </div>
      </div>
    </div>

    <!-- History page -->
    <div class="page" id="page-history">
      <div class="page-header">
        <h1 class="page-title">Mon <em>historique</em></h1>
      </div>
      <div class="history-grid" id="historyGrid"></div>
    </div>

  </main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Data & State ──────────────────────────────────────────────────────────────
const STORAGE_KEY = 'monbudget_v1';
let state = { transactions: {} };
let currentMonth = getCurrentMonthKey();
let currentType = 'expense';
let pieChartInstance = null;
const miniCharts = {};

const CAT_COLORS = {
  logement:     '#2d4a3e',
  nourriture:   '#c8622a',
  loisirs:      '#9b7b2e',
  transport:    '#4a5c6b',
  sante:        '#7a3a4a',
  vetements:    '#5c4a7a',
  abonnements:  '#2d5c6b',
  autres:       '#6b6b5c',
};

const CAT_LABELS = {
  logement: 'Logement', nourriture: 'Nourriture', loisirs: 'Loisirs',
  transport: 'Transport', sante: 'Santé', vetements: 'Vêtements',
  abonnements: 'Abonnements', autres: 'Autres',
};

const MONTH_NAMES = ['Janvier','Février','Mars','Avril','Mai','Juin',
                     'Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

function getCurrentMonthKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

function monthLabel(key) {
  const [y, m] = key.split('-');
  return `${MONTH_NAMES[parseInt(m)-1]} ${y}`;
}

// ── Persistence ───────────────────────────────────────────────────────────────
function load() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) state = JSON.parse(saved);
  } catch(e) {}
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function getMonthData(key) {
  return state.transactions[key] || [];
}

function fmt(amount) {
  return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR', maximumFractionDigits: 0 }).format(amount);
}

function formatDate(iso) {
  const d = new Date(iso);
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}`;
}

// ── Month list in sidebar ─────────────────────────────────────────────────────
function buildMonthList() {
  const list = document.getElementById('monthList');
  list.innerHTML = '';

  // Générer les 12 derniers mois + mois courant
  const months = [];
  const now = new Date();
  for (let i = 0; i < 12; i++) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    months.push(key);
  }

  // Ajouter aussi les mois qui ont des données
  Object.keys(state.transactions).forEach(k => {
    if (!months.includes(k)) months.push(k);
  });

  months.sort().reverse();

  months.forEach(key => {
    const btn = document.createElement('div');
    btn.className = 'month-btn' + (key === currentMonth ? ' active' : '');
    const hasData = (state.transactions[key] || []).length > 0;
    if (hasData) btn.classList.add('has-data');

    const [y, m] = key.split('-');
    const shortName = MONTH_NAMES[parseInt(m)-1].slice(0,3);

    btn.innerHTML = `<span>${shortName} ${y}</span><span class="dot"></span>`;
    btn.onclick = () => { currentMonth = key; renderAll(); };
    list.appendChild(btn);
  });
}

// ── Transactions ──────────────────────────────────────────────────────────────
function addTransaction() {
  const desc = document.getElementById('inputDesc').value.trim();
  const amount = parseFloat(document.getElementById('inputAmount').value);
  const cat = document.getElementById('inputCat').value;

  if (!desc) { showToast('Ajoute une description'); return; }
  if (!amount || amount <= 0) { showToast('Montant invalide'); return; }

  if (!state.transactions[currentMonth]) state.transactions[currentMonth] = [];

  state.transactions[currentMonth].push({
    id: Date.now(),
    desc,
    amount,
    cat,
    type: currentType,
    date: new Date().toISOString(),
  });

  save();
  document.getElementById('inputDesc').value = '';
  document.getElementById('inputAmount').value = '';
  showToast(currentType === 'expense' ? `− ${fmt(amount)} ajouté` : `+ ${fmt(amount)} ajouté`);
  renderAll();
}

function deleteTransaction(id) {
  if (!state.transactions[currentMonth]) return;
  state.transactions[currentMonth] = state.transactions[currentMonth].filter(t => t.id !== id);
  save();
  renderAll();
}

function setType(type) {
  currentType = type;
  document.getElementById('typeExpense').className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
  document.getElementById('typeIncome').className = 'type-btn' + (type === 'income' ? ' active-income' : '');
  // Show/hide category for income
  const catGroup = document.getElementById('inputCat').closest('.form-group');
  catGroup.style.display = type === 'income' ? 'none' : '';
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAll() {
  buildMonthList();
  renderDashboard();
}

function renderDashboard() {
  const txs = getMonthData(currentMonth);
  const expenses = txs.filter(t => t.type === 'expense');
  const incomes = txs.filter(t => t.type === 'income');

  const totalExp = expenses.reduce((s, t) => s + t.amount, 0);
  const totalInc = incomes.reduce((s, t) => s + t.amount, 0);
  const balance = totalInc - totalExp;

  // Badge mois
  document.getElementById('currentMonthBadge').textContent = monthLabel(currentMonth);

  // Cards
  document.getElementById('totalIncome').textContent = fmt(totalInc);
  document.getElementById('totalExpenses').textContent = fmt(totalExp);
  document.getElementById('balance').textContent = fmt(balance);
  document.getElementById('incomeCount').textContent = `${incomes.length} entrée${incomes.length > 1 ? 's' : ''}`;
  document.getElementById('expenseCount').textContent = `${expenses.length} dépense${expenses.length > 1 ? 's' : ''}`;

  const bc = document.getElementById('balanceCard');
  bc.className = 'card balance ' + (balance >= 0 ? 'positive' : 'negative');
  document.getElementById('balanceSub').textContent = balance > 0 ? '▲ Excédent' : balance < 0 ? '▼ Déficit' : 'À l\'équilibre';

  // Pie chart
  renderPie(expenses);

  // Transactions list
  renderTxList(txs);
}

function renderPie(expenses) {
  const canvas = document.getElementById('pieChart');
  const empty = document.getElementById('pieEmpty');
  const legend = document.getElementById('pieLegend');

  // Group by category
  const byCat = {};
  expenses.forEach(t => {
    byCat[t.cat] = (byCat[t.cat] || 0) + t.amount;
  });

  const total = Object.values(byCat).reduce((s, v) => s + v, 0);

  if (total === 0) {
    canvas.style.display = 'none';
    empty.style.display = 'block';
    legend.innerHTML = '';
    if (pieChartInstance) { pieChartInstance.destroy(); pieChartInstance = null; }
    return;
  }

  canvas.style.display = 'block';
  empty.style.display = 'none';

  const labels = Object.keys(byCat);
  const data = labels.map(k => byCat[k]);
  const colors = labels.map(k => CAT_COLORS[k] || '#888');

  if (pieChartInstance) pieChartInstance.destroy();

  pieChartInstance = new Chart(canvas, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: colors, borderWidth: 2, borderColor: '#fff', hoverOffset: 6 }] },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      cutout: '62%',
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ` ${CAT_LABELS[ctx.label] || ctx.label} : ${fmt(ctx.parsed)}`,
          }
        }
      }
    }
  });

  // Legend
  const sorted = labels.slice().sort((a, b) => byCat[b] - byCat[a]);
  legend.innerHTML = sorted.map(k => `
    <div class="legend-item">
      <div class="legend-left">
        <div class="legend-dot" style="background:${CAT_COLORS[k]}"></div>
        <span class="legend-name">${CAT_LABELS[k] || k}</span>
        <span class="legend-pct">${Math.round(byCat[k]/total*100)} %</span>
      </div>
      <span class="legend-amt">${fmt(byCat[k])}</span>
    </div>
  `).join('');
}

function renderTxList(txs) {
  const list = document.getElementById('txList');
  if (!txs.length) {
    list.innerHTML = '<div style="text-align:center;padding:30px;color:var(--muted);font-style:italic;font-size:13px;">Aucune entrée ce mois</div>';
    return;
  }

  const sorted = [...txs].sort((a, b) => new Date(b.date) - new Date(a.date));
  list.innerHTML = sorted.map(t => `
    <div class="tx-item">
      <div class="tx-left">
        <div class="tx-cat-dot" style="background:${t.type === 'income' ? 'var(--income-c)' : CAT_COLORS[t.cat] || '#888'}"></div>
        <div class="tx-info">
          <div class="tx-name">${t.desc}</div>
          <div class="tx-cat">${t.type === 'income' ? 'Revenu' : CAT_LABELS[t.cat] || t.cat}</div>
        </div>
      </div>
      <span class="tx-date">${formatDate(t.date)}</span>
      <span class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '−'} ${fmt(t.amount)}</span>
      <button class="tx-delete" onclick="deleteTransaction(${t.id})" title="Supprimer">✕</button>
    </div>
  `).join('');
}

// ── History page ──────────────────────────────────────────────────────────────
function renderHistory() {
  const grid = document.getElementById('historyGrid');

  const allMonths = Object.keys(state.transactions)
    .filter(k => state.transactions[k].length > 0)
    .sort().reverse();

  if (!allMonths.length) {
    grid.innerHTML = '<div class="empty-history">Aucun historique disponible encore.<br>Commence à enregistrer tes dépenses !</div>';
    return;
  }

  grid.innerHTML = allMonths.map(key => {
    const txs = state.transactions[key];
    const expenses = txs.filter(t => t.type === 'expense');
    const incomes  = txs.filter(t => t.type === 'income');
    const totalExp = expenses.reduce((s, t) => s + t.amount, 0);
    const totalInc = incomes.reduce((s, t)  => s + t.amount, 0);
    const bal = totalInc - totalExp;

    const byCat = {};
    expenses.forEach(t => { byCat[t.cat] = (byCat[t.cat] || 0) + t.amount; });
    const hasCats = Object.keys(byCat).length > 0;

    const [y, m] = key.split('-');

    return `
      <div class="history-card" onclick="goToMonth('${key}')">
        <div class="history-month">${MONTH_NAMES[parseInt(m)-1]}</div>
        <div class="history-year">${y}</div>
        <div class="history-chart-wrap">
          ${hasCats
            ? `<canvas id="mini_${key}" width="100" height="100"></canvas>`
            : `<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;font-style:italic;">Aucune dépense</div>`
          }
        </div>
        <div class="history-stats">
          <div>
            <div class="history-stat-label">Dépenses</div>
            <div class="history-stat-val neg">${fmt(totalExp)}</div>
          </div>
          <div>
            <div class="history-stat-label">Revenus</div>
            <div class="history-stat-val pos">${fmt(totalInc)}</div>
          </div>
          <div>
            <div class="history-stat-label">Solde</div>
            <div class="history-stat-val ${bal >= 0 ? 'pos' : 'neg'}">${fmt(bal)}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // Render mini charts
  requestAnimationFrame(() => {
    allMonths.forEach(key => {
      const canvas = document.getElementById(`mini_${key}`);
      if (!canvas) return;
      if (miniCharts[key]) { miniCharts[key].destroy(); }

      const txs = state.transactions[key];
      const expenses = txs.filter(t => t.type === 'expense');
      const byCat = {};
      expenses.forEach(t => { byCat[t.cat] = (byCat[t.cat] || 0) + t.amount; });

      const labels = Object.keys(byCat);
      if (!labels.length) return;

      miniCharts[key] = new Chart(canvas, {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data: labels.map(k => byCat[k]),
            backgroundColor: labels.map(k => CAT_COLORS[k] || '#888'),
            borderWidth: 1.5,
            borderColor: '#fff',
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          cutout: '55%',
          plugins: { legend: { display: false }, tooltip: { enabled: false } },
          animation: false,
        }
      });
    });
  });
}

function goToMonth(key) {
  currentMonth = key;
  showPage('dashboard');
}

// ── Page navigation ───────────────────────────────────────────────────────────
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('nav-' + page).classList.add('active');

  if (page === 'history') renderHistory();
  if (page === 'dashboard') renderDashboard();
}

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ──────────────────────────────────────────────────────────────────────
load();
renderAll();

// Enter key shortcut
document.getElementById('inputAmount').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTransaction();
});
document.getElementById('inputDesc').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inputAmount').focus();
});
</script>
